{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Lumina{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
  <div class="ambient" aria-hidden="true"></div>
  <header class="topbar">
    <a class="brand" href="{% url 'enhancer:home' %}">
      <span class="brand-mark"></span>
      Lumina
    </a>
    <nav class="nav">
      <a href="{% url 'enhancer:ai_enhancer' %}">AI</a>
      <a href="{% url 'enhancer:manual' %}">Manual</a>
      <a href="{% url 'enhancer:batch' %}">Batch</a>
      <a href="{% url 'enhancer:history' %}">History</a>
    </nav>
  </header>

  <main class="page">
    {% if messages %}
      <div class="messages">
        {% for message in messages %}
          <div class="message {{ message.tags }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>

  <script src="{% static 'js/app.js' %}"></script>
</body>
</html>
